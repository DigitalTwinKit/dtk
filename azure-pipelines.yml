# DigitalTwinKit Free — Claude Skills for Projects
# Packages the skills + README into a zip artifact

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)/skills'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/package/dtk-free/skills'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: 'README.md'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/package/dtk-free'

- task: ArchiveFiles@2
  displayName: 'Zip — dtk-free.zip'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/package/dtk-free'
    includeRootFolder: true
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/dtk-free.zip'
    replaceExistingArchive: true

- task: ArchiveFiles@2
  displayName: 'Zip — quarterly archive'
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/package/dtk-free'
    includeRootFolder: true
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/dtk-free-Q2-2026.zip'
    replaceExistingArchive: true

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'dtk-free'
    publishLocation: 'pipeline'

# DigitalTwinKit Free — Claude Skills for Projects
# Packages the skills + README into a pipeline artifact

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)/skills'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/package/dtk/skills'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: 'README.md'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/package/dtk'

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/package/dtk'
    artifact: '$(Build.BuildNumber)'
    publishLocation: 'pipeline'
